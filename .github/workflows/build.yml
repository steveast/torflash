name: Build & Release

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install -r requirements/test.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-libtorrent \
            python3-pyqt5 \
            mkvtoolnix \
            mediainfo \
            upx-ucl

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv --system-site-packages .build-venv
          .build-venv/bin/pip install -r requirements/build.txt

      - name: Build binary
        run: .build-venv/bin/pyinstaller --clean --noconfirm TorFlash.spec

      - name: Verify binary exists
        run: test -f dist/TorFlash && echo "Build OK — $(du -h dist/TorFlash | cut -f1)"

      - name: Build AppImage
        run: bash scripts/build-appimage.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum TorFlash > TorFlash.sha256
          sha256sum TorFlash-x86_64.AppImage > TorFlash-x86_64.AppImage.sha256
          cat TorFlash.sha256 TorFlash-x86_64.AppImage.sha256

      # Подпись minisign активна только когда задан secret MINISIGN_KEY
      # (приватный ключ). Без него шаг no-op — остаётся SHA-256.
      - name: Sign artifacts (minisign)
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if [ -z "$MINISIGN_KEY" ]; then echo "MINISIGN_KEY не задан — подпись пропущена"; exit 0; fi
          printf '%s\n' "$MINISIGN_KEY" > /tmp/ms.key
          # Подписываем через Python+cryptography (minisign-бинаря нет в apt 22.04)
          .build-venv/bin/python scripts/minisign_sign.py /tmp/ms.key \
            dist/TorFlash dist/TorFlash-x86_64.AppImage
          rm -f /tmp/ms.key
          ls -la dist/*.minisig

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: TorFlash-linux-x86_64
          if-no-files-found: ignore   # .minisig есть только когда настроена подпись
          path: |
            dist/TorFlash
            dist/TorFlash.sha256
            dist/TorFlash.minisig

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: TorFlash-AppImage
          if-no-files-found: ignore
          path: |
            dist/TorFlash-x86_64.AppImage
            dist/TorFlash-x86_64.AppImage.sha256
            dist/TorFlash-x86_64.AppImage.minisig

  build-windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        # libtorrent / PyQt5 ставятся pip-колёсами (на Linux — из apt). Внешние
        # mkvtoolnix/mediainfo не нужны: вызываются через shutil.which с фолбэком.
        run: pip install -r requirements/build.txt -r requirements/native.txt

      - name: Build binary
        run: pyinstaller --clean --noconfirm TorFlash.spec

      - name: Verify binary exists
        run: |
          if (-not (Test-Path dist\TorFlash.exe)) { throw "TorFlash.exe не собран" }
          "Build OK — {0:N1} MB" -f ((Get-Item dist\TorFlash.exe).Length / 1MB)

      - name: Generate checksum
        run: |
          $h = (Get-FileHash dist\TorFlash.exe -Algorithm SHA256).Hash.ToLower()
          "$h  TorFlash.exe" | Out-File -FilePath dist\TorFlash.exe.sha256 -Encoding ascii
          Get-Content dist\TorFlash.exe.sha256

      # Подпись minisign активна только при заданном secret MINISIGN_KEY.
      - name: Sign artifact (minisign)
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if (-not $env:MINISIGN_KEY) { Write-Host "MINISIGN_KEY не задан — подпись пропущена"; exit 0 }
          $env:MINISIGN_KEY | Out-File -FilePath "$env:TEMP\ms.key" -Encoding ascii
          python scripts\minisign_sign.py "$env:TEMP\ms.key" dist\TorFlash.exe
          Remove-Item "$env:TEMP\ms.key"
          Get-ChildItem dist\*.minisig

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: TorFlash-windows-x86_64
          if-no-files-found: ignore
          path: |
            dist/TorFlash.exe
            dist/TorFlash.exe.sha256
            dist/TorFlash.exe.minisig

  build-macos:
    needs: test
    # macOS экспериментально: без подписи/нотаризации Apple Gatekeeper блокирует
    # запуск. Только на тегах; не блокирует релиз (continue-on-error).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements/build.txt -r requirements/native.txt

      - name: Build .app bundle
        run: pyinstaller --clean --noconfirm TorFlash.spec

      - name: Package .app
        run: |
          test -d dist/TorFlash.app || { echo "TorFlash.app не собран"; exit 1; }
          ditto -c -k --keepParent dist/TorFlash.app dist/TorFlash-macos.app.zip

      - name: Generate checksum
        run: |
          cd dist
          shasum -a 256 TorFlash-macos.app.zip > TorFlash-macos.app.zip.sha256
          cat TorFlash-macos.app.zip.sha256

      - name: Sign artifact (minisign)
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if [ -z "$MINISIGN_KEY" ]; then echo "MINISIGN_KEY не задан — подпись пропущена"; exit 0; fi
          printf '%s\n' "$MINISIGN_KEY" > /tmp/ms.key
          python scripts/minisign_sign.py /tmp/ms.key dist/TorFlash-macos.app.zip
          rm -f /tmp/ms.key

      - name: Upload app
        uses: actions/upload-artifact@v7
        with:
          name: TorFlash-macos
          if-no-files-found: ignore
          path: |
            dist/TorFlash-macos.app.zip
            dist/TorFlash-macos.app.zip.sha256
            dist/TorFlash-macos.app.zip.minisig

  release:
    needs: [test, build, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all platform artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-all

      - name: List artifacts
        run: find dist-all -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist-all/**/TorFlash
            dist-all/**/TorFlash.exe
            dist-all/**/*.AppImage
            dist-all/**/*.app.zip
            dist-all/**/*.sha256
            dist-all/**/*.minisig
          fail_on_unmatched_files: false   # .minisig есть только при настроенной подписи; macOS может отсутствовать
          generate_release_notes: true
          draft: false

  publish-aur:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    # Авто-публикация пакета torflash-bin в AUR. Активна только при заданном
    # secret AUR_SSH_KEY (приватный SSH-ключ, чей публичный добавлен в SSH-ключи
    # аккаунта AUR). Без него джоба — no-op. pkgver и sha256sums выводятся ЗДЕСЬ
    # из тега и только что опубликованных релизных ассетов (updpkgsums), поэтому
    # aur/PKGBUILD в репозитории — шаблон: вручную бампить его не обязательно.
    runs-on: ubuntu-22.04
    container: archlinux:base-devel
    steps:
      # Тулинг ставим ДО checkout, чтобы actions/checkout использовал системный git.
      - name: Install tooling
        run: pacman -Syu --noconfirm --needed pacman-contrib openssh git

      - uses: actions/checkout@v7

      - name: Gate on AUR_SSH_KEY
        id: gate
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "AUR_SSH_KEY не задан — публикация в AUR пропущена"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pin version + checksums, regenerate .SRCINFO
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          # makepkg/updpkgsums отказываются работать от root — отдельный юзер.
          useradd -m builder
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s/^pkgver=.*/pkgver=$VER/" aur/PKGBUILD
          chown -R builder: aur
          # updpkgsums скачивает опубликованные ассеты (бинарь из релиза + raw-файлы
          # на теге v$VER) и проставляет настоящие sha256 в PKGBUILD.
          ( cd aur && sudo -u builder updpkgsums )
          ( cd aur && sudo -u builder makepkg --printsrcinfo ) > aur/.SRCINFO
          echo "VER=$VER" >> "$GITHUB_ENV"
          echo "----- PKGBUILD -----"; cat aur/PKGBUILD

      - name: Push to AUR
        if: steps.gate.outputs.enabled == 'true'
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          install -dm700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null || true
          # accept-new — надёжная замена ssh-keyscan: в контейнере keyscan порой
          # не наполняет known_hosts (или отдаёт ключ другого типа), и clone падал
          # с «Host key verification failed». accept-new сам добавит ключ хоста.
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          git clone ssh://aur@aur.archlinux.org/torflash-bin.git aur-clone
          cp aur/PKGBUILD aur/.SRCINFO aur-clone/
          cd aur-clone
          git config user.name "TorFlash CI"
          git config user.email "ci@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR уже на $VER — пушить нечего"; exit 0
          fi
          git commit -m "Update to $VER"
          git push origin master
