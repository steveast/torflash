name: Build & Release

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-libtorrent \
            python3-pyqt5 \
            mkvtoolnix \
            mediainfo \
            upx-ucl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv --system-site-packages .build-venv
          .build-venv/bin/pip install pyinstaller requests

      - name: Build binary
        run: .build-venv/bin/pyinstaller --clean --noconfirm TorFlash.spec

      - name: Verify binary exists
        run: test -f dist/TorFlash && echo "Build OK — $(du -h dist/TorFlash | cut -f1)"

      - name: Build AppImage
        run: bash scripts/build-appimage.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum TorFlash > TorFlash.sha256
          sha256sum TorFlash-x86_64.AppImage > TorFlash-x86_64.AppImage.sha256
          cat TorFlash.sha256 TorFlash-x86_64.AppImage.sha256

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: TorFlash-linux-x86_64
          path: |
            dist/TorFlash
            dist/TorFlash.sha256

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: TorFlash-AppImage
          path: |
            dist/TorFlash-x86_64.AppImage
            dist/TorFlash-x86_64.AppImage.sha256

  release:
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: TorFlash-linux-x86_64

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: TorFlash-AppImage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TorFlash
            TorFlash.sha256
            TorFlash-x86_64.AppImage
            TorFlash-x86_64.AppImage.sha256
          generate_release_notes: true
          draft: false
