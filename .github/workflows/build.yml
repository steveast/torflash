name: Build & Release

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install -r requirements/test.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-libtorrent \
            python3-pyqt5 \
            mkvtoolnix \
            mediainfo \
            upx-ucl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv --system-site-packages .build-venv
          .build-venv/bin/pip install -r requirements/build.txt

      - name: Build binary
        run: .build-venv/bin/pyinstaller --clean --noconfirm TorFlash.spec

      - name: Verify binary exists
        run: test -f dist/TorFlash && echo "Build OK — $(du -h dist/TorFlash | cut -f1)"

      - name: Build AppImage
        run: bash scripts/build-appimage.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum TorFlash > TorFlash.sha256
          sha256sum TorFlash-x86_64.AppImage > TorFlash-x86_64.AppImage.sha256
          cat TorFlash.sha256 TorFlash-x86_64.AppImage.sha256

      # Подпись minisign активна только когда задан secret MINISIGN_KEY
      # (приватный ключ). Без него шаг no-op — остаётся SHA-256.
      - name: Sign artifacts (minisign)
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if [ -z "$MINISIGN_KEY" ]; then echo "MINISIGN_KEY не задан — подпись пропущена"; exit 0; fi
          printf '%s\n' "$MINISIGN_KEY" > /tmp/ms.key
          # Подписываем через Python+cryptography (minisign-бинаря нет в apt 22.04)
          .build-venv/bin/python scripts/minisign_sign.py /tmp/ms.key \
            dist/TorFlash dist/TorFlash-x86_64.AppImage
          rm -f /tmp/ms.key
          ls -la dist/*.minisig

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: TorFlash-linux-x86_64
          if-no-files-found: ignore   # .minisig есть только когда настроена подпись
          path: |
            dist/TorFlash
            dist/TorFlash.sha256
            dist/TorFlash.minisig

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: TorFlash-AppImage
          if-no-files-found: ignore
          path: |
            dist/TorFlash-x86_64.AppImage
            dist/TorFlash-x86_64.AppImage.sha256
            dist/TorFlash-x86_64.AppImage.minisig

  build-windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        # libtorrent / PyQt5 ставятся pip-колёсами (на Linux — из apt). Внешние
        # mkvtoolnix/mediainfo не нужны: вызываются через shutil.which с фолбэком.
        run: pip install -r requirements/build.txt -r requirements/native.txt

      - name: Build binary
        run: pyinstaller --clean --noconfirm TorFlash.spec

      - name: Verify binary exists
        run: |
          if (-not (Test-Path dist\TorFlash.exe)) { throw "TorFlash.exe не собран" }
          "Build OK — {0:N1} MB" -f ((Get-Item dist\TorFlash.exe).Length / 1MB)

      - name: Generate checksum
        run: |
          $h = (Get-FileHash dist\TorFlash.exe -Algorithm SHA256).Hash.ToLower()
          "$h  TorFlash.exe" | Out-File -FilePath dist\TorFlash.exe.sha256 -Encoding ascii
          Get-Content dist\TorFlash.exe.sha256

      # Подпись minisign активна только при заданном secret MINISIGN_KEY.
      - name: Sign artifact (minisign)
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if (-not $env:MINISIGN_KEY) { Write-Host "MINISIGN_KEY не задан — подпись пропущена"; exit 0 }
          $env:MINISIGN_KEY | Out-File -FilePath "$env:TEMP\ms.key" -Encoding ascii
          python scripts\minisign_sign.py "$env:TEMP\ms.key" dist\TorFlash.exe
          Remove-Item "$env:TEMP\ms.key"
          Get-ChildItem dist\*.minisig

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: TorFlash-windows-x86_64
          if-no-files-found: ignore
          path: |
            dist/TorFlash.exe
            dist/TorFlash.exe.sha256
            dist/TorFlash.exe.minisig

  build-macos:
    needs: test
    # macOS экспериментально: без подписи/нотаризации Apple Gatekeeper блокирует
    # запуск. Только на тегах; не блокирует релиз (continue-on-error).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements/build.txt -r requirements/native.txt

      - name: Build .app bundle
        run: pyinstaller --clean --noconfirm TorFlash.spec

      - name: Package .app
        run: |
          test -d dist/TorFlash.app || { echo "TorFlash.app не собран"; exit 1; }
          ditto -c -k --keepParent dist/TorFlash.app dist/TorFlash-macos.app.zip

      - name: Generate checksum
        run: |
          cd dist
          shasum -a 256 TorFlash-macos.app.zip > TorFlash-macos.app.zip.sha256
          cat TorFlash-macos.app.zip.sha256

      - name: Sign artifact (minisign)
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if [ -z "$MINISIGN_KEY" ]; then echo "MINISIGN_KEY не задан — подпись пропущена"; exit 0; fi
          printf '%s\n' "$MINISIGN_KEY" > /tmp/ms.key
          python scripts/minisign_sign.py /tmp/ms.key dist/TorFlash-macos.app.zip
          rm -f /tmp/ms.key

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: TorFlash-macos
          if-no-files-found: ignore
          path: |
            dist/TorFlash-macos.app.zip
            dist/TorFlash-macos.app.zip.sha256
            dist/TorFlash-macos.app.zip.minisig

  release:
    needs: [test, build, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: List artifacts
        run: find dist-all -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-all/**/TorFlash
            dist-all/**/TorFlash.exe
            dist-all/**/*.AppImage
            dist-all/**/*.app.zip
            dist-all/**/*.sha256
            dist-all/**/*.minisig
          fail_on_unmatched_files: false   # .minisig есть только при настроенной подписи; macOS может отсутствовать
          generate_release_notes: true
          draft: false
