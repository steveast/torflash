name: Build & Release

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest requests cryptography

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-libtorrent \
            python3-pyqt5 \
            mkvtoolnix \
            mediainfo \
            upx-ucl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv --system-site-packages .build-venv
          .build-venv/bin/pip install pyinstaller requests cryptography

      - name: Build binary
        run: .build-venv/bin/pyinstaller --clean --noconfirm TorFlash.spec

      - name: Verify binary exists
        run: test -f dist/TorFlash && echo "Build OK — $(du -h dist/TorFlash | cut -f1)"

      - name: Build AppImage
        run: bash scripts/build-appimage.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum TorFlash > TorFlash.sha256
          sha256sum TorFlash-x86_64.AppImage > TorFlash-x86_64.AppImage.sha256
          cat TorFlash.sha256 TorFlash-x86_64.AppImage.sha256

      # Подпись minisign активна только когда задан secret MINISIGN_KEY
      # (приватный ключ). Без него шаг no-op — остаётся SHA-256.
      - name: Sign artifacts (minisign)
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if [ -z "$MINISIGN_KEY" ]; then echo "MINISIGN_KEY не задан — подпись пропущена"; exit 0; fi
          printf '%s\n' "$MINISIGN_KEY" > /tmp/ms.key
          # Подписываем через Python+cryptography (minisign-бинаря нет в apt 22.04)
          .build-venv/bin/python scripts/minisign_sign.py /tmp/ms.key \
            dist/TorFlash dist/TorFlash-x86_64.AppImage
          rm -f /tmp/ms.key
          ls -la dist/*.minisig

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: TorFlash-linux-x86_64
          if-no-files-found: ignore   # .minisig есть только когда настроена подпись
          path: |
            dist/TorFlash
            dist/TorFlash.sha256
            dist/TorFlash.minisig

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: TorFlash-AppImage
          if-no-files-found: ignore
          path: |
            dist/TorFlash-x86_64.AppImage
            dist/TorFlash-x86_64.AppImage.sha256
            dist/TorFlash-x86_64.AppImage.minisig

  release:
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: TorFlash-linux-x86_64

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: TorFlash-AppImage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TorFlash
            TorFlash.sha256
            TorFlash-x86_64.AppImage
            TorFlash-x86_64.AppImage.sha256
            TorFlash.minisig
            TorFlash-x86_64.AppImage.minisig
          fail_on_unmatched_files: false   # .minisig присутствуют только при настроенной подписи
          generate_release_notes: true
          draft: false
